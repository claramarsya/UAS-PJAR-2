{% extends "base.html" %}
{% block title %}Registrasi{% endblock %}
{% block content %}
<div class="card">
  <h1>Buat Akun</h1>
  <p class="subtitle">Setelah daftar, email verifikasi akan dikirim ke alamat Anda.</p>
  <form method="POST" action="{{ url_for('register') }}">
    <label for="name">Nama Lengkap</label>
    <input type="text" id="name" name="name" required placeholder="Nama Anda">

    <label for="email">Email</label>
    <input type="email" id="email" name="email" required placeholder="nama@email.com">

    <label for="password">Password</label>
    <input type="password" id="password" name="password" required placeholder="Minimal 6 karakter">

    <button type="submit">Daftar</button>
  </form>
  <p class="helper-text">Sudah punya akun? <a href="{{ url_for('login') }}">Login di sini</a></p>
</div>
{% endblock %}
